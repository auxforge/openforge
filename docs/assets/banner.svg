<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1205" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <linearGradient id="fireGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ff2a00" />
      <stop offset="40%" stop-color="#ff7300" />
      <stop offset="80%" stop-color="#ffb300" />
      <stop offset="100%" stop-color="#ffe600" />
    </linearGradient>
    <linearGradient id="anvilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ebedf0" />
      <stop offset="30%" stop-color="#a0aab5" />
      <stop offset="70%" stop-color="#55606b" />
      <stop offset="100%" stop-color="#222" />
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a0aab5" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#333" />
    </pattern>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bbbbbb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo Left Side -->
  <g transform="translate(300, 315) scale(0.6)">
    <g transform="translate(0, 0)">
      <path d="M -80 -10 C -120 -80 -60 -180 -10 -110 C 20 -190 80 -190 50 -100 C 130 -160 160 -80 80 -10 Z" fill="url(#fireGrad)" filter="url(#neonGlow)" />
      <path d="M -160 0 L -80 -20 L 140 -20 C 160 -20 180 -10 160 0 L -160 0 Z" fill="url(#anvilGrad)" />
      <path d="M -60 0 L 120 0 L 100 80 L -40 80 Z" fill="url(#anvilGrad)" />
      <path d="M -100 120 L -80 80 L 140 80 L 160 120 Z" fill="url(#anvilGrad)" />
      <path d="M -120 150 L -100 120 L 160 120 L 180 150 Z" fill="url(#anvilGrad)" />
      <circle cx="20" cy="-25" r="18" fill="#ffffff" filter="url(#neonGlow)" />
      <g transform="translate(70, -110) rotate(35)">
        <path d="M -15 0 L 15 0 L 10 120 L -10 120 Z" fill="#333" />
        <rect x="-40" y="-30" width="80" height="40" rx="8" fill="url(#hammerGrad)" />
      </g>
      <circle cx="-60" cy="-60" r="6" fill="#ffe600" filter="url(#neonGlow)" />
      <circle cx="-20" cy="-120" r="4" fill="#ff7300" filter="url(#neonGlow)" />
      <circle cx="90" cy="-80" r="8" fill="#ffffff" filter="url(#neonGlow)" />
    </g>
  </g>

  <!-- Text Right Side -->
  <g transform="translate(480, 290)">
    <text x="0" y="0" font-family="'Inter', -apple-system, sans-serif" font-weight="700" font-size="80" fill="url(#textGrad)" letter-spacing="-2">
      OpenForge
    </text>
    <text x="0" y="60" font-family="'Inter', -apple-system, sans-serif" font-weight="500" font-size="28" fill="#888" letter-spacing="0">
      Open-source AI Agent Builder
    </text>

    <!-- Badges -->
    <g transform="translate(0, 110)">
      <rect width="100" height="36" rx="18" fill="rgba(255, 107, 43, 0.1)" stroke="rgba(255, 107, 43, 0.2)"/>
      <text x="50" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#ff6b2b" text-anchor="middle">MCP Ready</text>
    </g>
    <g transform="translate(120, 110)">
      <rect width="100" height="36" rx="18" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)"/>
      <text x="50" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#ccc" text-anchor="middle">Tool Calling</text>
    </g>
    <g transform="translate(240, 110)">
      <rect width="110" height="36" rx="18" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)"/>
      <text x="55" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#ccc" text-anchor="middle">Event Streams</text>
    </g>
  </g>
</svg>
